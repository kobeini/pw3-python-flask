{% extends 'base.html' %}
{% block content %}

<h2>Controle de estoque de Consoles</h2>
<br>

<details>
    <sumary>[Cadstrar novo jogo]</sumary>
    <div class="col-md-4">
        <form action="{{url_for('estoque_console')}}" method="POST">
            <input type="text" name="nome" placeholder="Nome" class="form-control" required>
            <input type="text" name="fabricante" placeholder="Fabricante" class="form-control" required>
            <input type="number" name="ano" placeholder="Ano" class="form-control" required>
            <input type="number" name="preco" placeholder="Preco" class="Categoria" required>
            <br>
            <input type="submit" value="Cadastrar" class="btn btn-success">
            <input type="reset" value="Limpar" class="btn btn-danger">
        </form>
    </div>
</details>
<hr>
<table class="table table-bordered table-hover">
    <!-- CABEÇALHO DA TABELA -->
     <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>Fabricante</th>
            <th>Ano</th>
            <th>Preço</th>
           
        </tr>
    </thead>
    <tbody>
        <!-- CORPO DA TABELA -->
         {% for console in consoles %}
         <tr>
            <td>{{console.nome}}</td>
            <td>{{console.fabricante}}</td>
            <td>{{console.ano}}</td>
            <td>{{console.preco}}</td>  
         </tr>
         {% endfor %}
    </tbody>

    </table>
    {% endblock content %}
