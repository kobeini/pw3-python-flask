{% extends 'base.html' %} {%block content%}

<h2>Cadastro de Jogos</h2>
<hr />

<form action="{{url_for('cadastrar')}}" method="post">
  <label>Título</label>
  <input
    type="text"
    name="titulo"
    placeholder="Insira o título do jogo"
    class="form-control"
    required
  />
  <br />

  <label>Ano</label>
  <input
    type="text"
    name="ano"
    placeholder="Insira o Ano do jogo"
    class="form-control"
    required
  />
  <br />

  <label>Categoria</label>
  <input
    type="text"
    name="categoria"
    placeholder="Insira o Categoria do jogo"
    class="form-control"
    required
  />
  <br />

  <label>Plataforma</label>
  <input
    type="text"
    name="plataforma"
    placeholder="Insira o Plataforma do jogo"
    class="form-control"
    required
  />
  <br />

  <input type="submit" value="Cadastrar" class="btn btn-succes" />
  <input type="reset" value="Limpar" class="btn btn-danger" />
</form>
<br />
<hr />

<table class="table table bordered table-hover">
  <thead class="table-dark">
    <tr>
      <th>Título</th>
      <th>Ano</th>
      <th>Categoria</th>
      <th>Plataforma</th>
    </tr>
  </thead>
  <tbody>
    {% for game in listaGames %}
    <tr>
        <td>{{game.titulo}}</td>
        <td>{{game.ano}}</td>
        <td>{{game.categoria}}</td>
        <td>{{game.plataforma}}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{%endblock content %}
